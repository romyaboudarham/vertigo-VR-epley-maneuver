<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vertigo VR – Epley Maneuver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="script.js?v=36"></script>
  <style>
    body { margin: 0; background: #050a0f; }
  </style>
</head>

<body>
  <a-scene
    background="color: #050a0f"
    vr-mode-ui="enabled: true"
    renderer="antialias: true">

    <a-assets>
      <img id="img-arrow-right" src="models/Arrows/Right Arrow.png">
      <img id="img-arrow-left"  src="models/Arrows/Left Arrow.png">
    </a-assets>

    <!-- ═══════════════════════════════════════════
         Camera + Gaze Cursor
    ════════════════════════════════════════════ -->
    <a-camera
      position="0 0 0"
      look-controls="magicWindowTrackingEnabled: true"
      wasd-controls="enabled: false">

      <a-cursor
        color="#ffffff"
        opacity="0.9"
        fuse="false"
        raycaster="objects: .gaze-target; far: 20">
      </a-cursor>

      <!-- Tube locked to camera — shown/hidden by SceneManager -->
      <a-entity id="tube-left"  tube-canal="ear: left"  position="-0.051 -0.421 -2.512" rotation="9.503 176.01 -0.578" scale="0.375 0.375 0.375" visible="false"></a-entity>
      <a-entity id="tube-right" tube-canal="ear: right" position="-0.051 -0.421 -2.512" rotation="9.503 176.01 -0.578" scale="0.375 0.375 0.375" visible="false"></a-entity>

      <!-- Instruction text — shown above tube during ear sessions -->
      <a-text
        id="instruction-text"
        value="Lean back, look up to start the session."
        position="0 1.5 -2.512"
        align="center"
        color="#e0e0e0"
        width="6"
        font="roboto"
        visible="false">
      </a-text>

      <!-- Scene 3 camera UI — fixed to viewport, shown only during scene 3 -->
      <a-image id="scene3-arrow-right" src="#img-arrow-right" width="0.6" height="0.6" position="0 -1.65 -2.5" visible="false"></a-image>
      <a-image id="scene3-arrow-left"  src="#img-arrow-left"  width="0.6" height="0.6" position="0 -1.65 -2.5" visible="false"></a-image>

      <a-text
        id="scene3-text"
        value="Turn right"
        position="0 -1.1 -2.5"
        align="center"
        color="#e0e0e0"
        width="2.5"
        font="roboto"
        visible="false">
      </a-text>

    </a-camera>

    <!-- ═══════════════════════════════════════════
         SCENE 1 — Ear Selection (landing page)
    ════════════════════════════════════════════ -->
    <a-entity id="scene-selection" visible="true">

      <!-- Title -->
      <a-text
        value="Which ear is affected?"
        position="0 1.8 -5"
        align="center"
        color="#e0e0e0"
        width="7"
        font="roboto">
      </a-text>

      <!-- LEFT EAR hit area -->
      <a-entity
        id="left-option"
        class="gaze-target"
        geometry="primitive: circle; radius: 0.75"
        material="color: #000; opacity: 0; transparent: true; side: double"
        position="-2.8 0 -5"
        gaze-select="label: left; duration: 3000">

        <a-circle
          class="visual-dot"
          radius="0.65"
          position="0 0 0.001"
          material="shader: flat; color: #2979ff; side: double">
        </a-circle>

        <a-ring
          class="gaze-ring"
          radius-inner="0.68"
          radius-outer="0.75"
          position="0 0 0.0005"
          material="shader: flat; color: #2979ff; opacity: 0.35; transparent: true; side: double">
        </a-ring>

        <a-text
          class="countdown-text"
          value=""
          position="0 0 0.003"
          align="center"
          color="#ffffff"
          width="1.2"
          wrap-count="2"
          font="roboto">
        </a-text>

      </a-entity>

      <a-text
        value="LEFT EAR"
        position="-2.8 -1.1 -5"
        align="center"
        color="#90caf9"
        width="3"
        font="roboto">
      </a-text>

      <!-- RIGHT EAR hit area -->
      <a-entity
        id="right-option"
        class="gaze-target"
        geometry="primitive: circle; radius: 0.75"
        material="color: #000; opacity: 0; transparent: true; side: double"
        position="2.8 0 -5"
        gaze-select="label: right; duration: 3000">

        <a-circle
          class="visual-dot"
          radius="0.65"
          position="0 0 0.001"
          material="shader: flat; color: #ff1744; side: double">
        </a-circle>

        <a-ring
          class="gaze-ring"
          radius-inner="0.68"
          radius-outer="0.75"
          position="0 0 0.0005"
          material="shader: flat; color: #ff1744; opacity: 0.35; transparent: true; side: double">
        </a-ring>

        <a-text
          class="countdown-text"
          value=""
          position="0 0 0.003"
          align="center"
          color="#ffffff"
          width="1.2"
          wrap-count="2"
          font="roboto">
        </a-text>

      </a-entity>

      <a-text
        value="RIGHT EAR"
        position="2.8 -1.1 -5"
        align="center"
        color="#ef9a9a"
        width="3"
        font="roboto">
      </a-text>

    </a-entity><!-- /scene-selection -->


    <!-- ═══════════════════════════════════════════
         SCENE 2 — Ear Experience (shared for left/right)
    ════════════════════════════════════════════ -->
    <a-entity id="scene-ear" visible="false">

      <!-- START button — on the ceiling so the user lies down and looks up -->
      <a-entity
        class="gaze-target"
        geometry="primitive: circle; radius: 0.6"
        material="color: #000; opacity: 0; transparent: true; side: double"
        position="0 5 -1"
        rotation="75 0 0"
        gaze-select="label: start; duration: 3000">

        <a-circle
          class="visual-dot"
          radius="0.52"
          position="0 0 0.001"
          material="shader: flat; color: #00c853; side: double">
        </a-circle>

        <a-ring
          class="gaze-ring"
          radius-inner="0.55"
          radius-outer="0.6"
          position="0 0 0.0005"
          material="shader: flat; color: #00c853; opacity: 0.35; transparent: true; side: double">
        </a-ring>

        <a-text
          class="countdown-text"
          value=""
          position="0 0 0.003"
          align="center"
          color="#ffffff"
          width="1"
          wrap-count="2"
          font="roboto">
        </a-text>

      </a-entity>

      <a-text
        value="START"
        position="0 3.9 -0.85"
        rotation="75 0 0"
        align="center"
        color="#69f0ae"
        width="3"
        font="roboto">
      </a-text>


      <!-- BACK button -->
      <a-entity
        class="gaze-target"
        geometry="primitive: circle; radius: 0.45"
        material="color: #000; opacity: 0; transparent: true; side: double"
        position="0 -1.5 -4"
        gaze-select="label: back; duration: 3000">
        <a-circle class="visual-dot" radius="0.4" position="0 0 0.001"
          material="shader: flat; color: #546e7a; side: double"></a-circle>
        <a-ring class="gaze-ring" radius-inner="0.42" radius-outer="0.45" position="0 0 0.0005"
          material="shader: flat; color: #546e7a; opacity: 0.35; transparent: true; side: double"></a-ring>
        <a-text class="countdown-text" value="" position="0 0 0.003" align="center" color="#ffffff" width="0.75" wrap-count="2" font="roboto"></a-text>
      </a-entity>

      <a-text
        value="BACK"
        position="0 -2.1 -4"
        align="center"
        color="#90a4ae"
        width="3"
        font="roboto">
      </a-text>

    </a-entity><!-- /scene-ear -->

    <!-- Placeholders for scene manager — UI is camera-mounted -->
    <a-entity id="scene-3" visible="false"></a-entity>
    <a-entity id="scene-4" visible="false"></a-entity>

    <a-sky color="#050a0f"></a-sky>

  </a-scene>
</body>
</html>
